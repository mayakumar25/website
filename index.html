<!DOCTYPE html>
<html lang="en">
<head>
    <title>WEBSITE</title>
    <style>
        .container {
            position: relative;
            width: 100%;
            height: 500px;
            background-image: url('img.jpg'); 
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            
        
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        }

        
        @keyframes colorChange {
            50% { color: black; }
            100% { color:grey; }
            50% { color: rgba(255, 0, 0, 0.336); }
        }

        .animated-text {
    position: absolute;
    top: 70px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 3rem;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
    animation: colorChange s infinite;
}

    </style>
</head>
<body>

    <div class="container">
        <span class="animated-text">WELCOME TO MY WEBSITE</span>
    </div>

</body>
</html>
